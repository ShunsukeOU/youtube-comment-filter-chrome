<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>

    body { width: 320px; font-family: sans-serif; padding: 15px; color: #333; margin: 0; }
    
    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-weight: bold; }
    
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: #2196F3; }
    input:checked + .slider:before { transform: translateX(20px); }

    .section-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #eee; font-weight: bold; background: #f9f9f9; margin-top: 10px; border-radius: 4px; transition: background 0.2s;}
    .section-header:hover { background: #f0f0f0; }
    .section-content { display: none; padding: 10px 5px; }
    .section-content.active { display: block; }

    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px;}
    .btn { cursor: pointer; padding: 5px 10px; border: none; border-radius: 4px; font-size: 12px; transition: 0.2s; }
    
    .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
    .input-group input { flex-grow: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
    
    .btn-add { background: #2196F3; color: white; }
    .btn-remove { background: #f44336; color: white; }
    .btn-off { background: #e0e0e0; color: #555; }
  </style>
</head>
<body>

  <div class="toggle-row">
    <span>拡張機能を有効にする</span>
    <label class="switch"><input type="checkbox" id="ext-toggle"><span class="slider"></span></label>
  </div>
  <div class="toggle-row">
    <span>日本語以外のコメントを隠す</span>
    <label class="switch"><input type="checkbox" id="lang-toggle"><span class="slider"></span></label>
  </div>

  <div class="section-header" id="header-default">
    <span>基本キーワード一覧を表示</span><span class="arrow">▼</span>
  </div>
  <div class="section-content" id="content-default">
    <ul id="default-list"></ul>
  </div>

  <div class="section-header" id="header-custom">
    <span>カスタムキーワードを追加</span><span class="arrow">▼</span>
  </div>
  <div class="section-content" id="content-custom">
    <div class="input-group">
      <input type="text" id="custom-input" placeholder="追加したい言葉を入力">
      <button class="btn btn-add" id="add-btn">追加</button>
    </div>
    <ul id="custom-list"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
